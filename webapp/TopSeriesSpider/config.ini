[spider]
# 是否启用 TMDB API（True/False）
use_tmdb = True
# 语言（zh-CN 或 en-US）
language = zh-CN

[logging]
level = INFO
console_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
file_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
max_bytes = 10485760
backup_count = 5

[paths]
log_root = C:/Users/Administrator/._my_python_tools

[play_sources]
# 可选的第三方播放源，格式：名称|URL模板，多个用逗号分隔
# {encoded_name} 会被剧名的URL编码替换
# 注意：这些源的版权状态不明确，商业化使用需谨慎
sources = 人人视频|https://www.rrys2024.com/search?q={encoded_name}, 美剧鸟|https://www.meijuniao.com/search/{encoded_name}.html, 美剧星球|https://www.meijuxingqiu.com/search/{encoded_name}/